pre-commit:
  commands:
    check:
      glob: "*.{ts,tsx,js,jsx,mts,json}"
      run: pnpm exec biome check --write {staged_files}
      stage_fixed: true
    format-scss:
      glob: "*.scss"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    typecheck:
      run: pnpm typecheck
